name: quotenest
description: A beautiful quotes application with multi-language support, favorites, and sharing.
publish_to: "none"
version: 1.0.3+3

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Networking
  http: ^1.2.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI & Fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Sharing & Clipboard
  share_plus: ^7.2.2

  # Screenshot / Image Export
  screenshot: ^3.0.0
#  image_gallery_saver: ^2.0.0
#  image_gallery_saver_plus: ^4.0.1
  permission_handler: ^11.3.0

  # File System
  path_provider: ^2.1.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
